<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark sci-fi background -->
  <rect width="32" height="32" rx="4" fill="#09090b"/>
  <!-- Gantry portal frame: top crossbeam -->
  <rect x="4" y="6" width="24" height="3.5" rx="1" fill="#22c55e"/>
  <!-- Left leg -->
  <rect x="4" y="6" width="3.5" height="21" rx="1" fill="#22c55e"/>
  <!-- Right leg -->
  <rect x="24.5" y="6" width="3.5" height="21" rx="1" fill="#22c55e"/>
  <!-- Trolley on top beam -->
  <rect x="13" y="9.5" width="6" height="2.5" rx="0.5" fill="#22c55e" opacity="0.9"/>
  <!-- Cable -->
  <rect x="15.25" y="12" width="1.5" height="8" fill="#22c55e" opacity="0.55"/>
  <!-- Cargo / payload box -->
  <rect x="12" y="20" width="8" height="6" rx="1.5" fill="#22c55e" opacity="0.45"/>
  <!-- Subtle grid lines on payload -->
  <line x1="16" y1="20" x2="16" y2="26" stroke="#09090b" stroke-width="0.75" opacity="0.5"/>
  <line x1="12" y1="23" x2="20" y2="23" stroke="#09090b" stroke-width="0.75" opacity="0.5"/>
</svg>
